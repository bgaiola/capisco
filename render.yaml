services:
  - type: web
    name: cappisco
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm run build:all
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

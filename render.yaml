services:
  - type: web
    name: cappisco
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm run build:all
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Required — for voice cloning + TTS. Set in Render dashboard.
      - key: ELEVENLABS_API_KEY
        sync: false

      # Required — auto-generated unique secret per environment.
      - key: JWT_SECRET
        generateValue: true

      - key: NODE_ENV
        value: production

      # Public URL of the deployed app (Render will inject this).
      - key: APP_URL
        sync: false

      # Stripe billing — leave blank for now (paywalls will show
      # "billing not configured" gracefully). Add later when ready.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BASIC
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false

      # Persistent database — set to a Postgres URL (Neon free tier works great).
      # When unset, the backend falls back to a local SQLite file (NOT persistent
      # on Render's free plan — usage data wipes on every restart).
      - key: DATABASE_URL
        sync: false

      # Open-beta switch: set to "basic" or "pro" to grant free users that tier's
      # capabilities transparently — no paywall, no Stripe needed. Remove (or
      # leave blank) to re-enable the regular paywall.
      - key: BETA_FREE_ACCESS
        value: pro
